<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Cuentas — Journal del Rey</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" type="image/png" href="assets/logo-blanco.png" />
  <style>
    .accounts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .account-type-badge {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 99px;
    }

    .account-size {
      font-family: var(--font-mono);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      margin: 12px 0 6px;
    }

    .account-pnl {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
    }

    .account-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .account-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
    }

    .account-meta-row .key { color: var(--text-muted); }
    .account-meta-row .val { color: var(--text-secondary); font-weight: 500; }

    .account-footer {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .add-account-card {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      min-height: 200px;
      color: var(--text-muted);
      text-align: center;
    }

    .add-account-card:hover {
      border-color: var(--brand-orange);
      color: var(--brand-orange);
      background: var(--brand-orange-dim);
    }

    .add-account-card svg { width: 32px; height: 32px; opacity: 0.5; transition: opacity var(--transition); }
    .add-account-card:hover svg { opacity: 1; }

    .add-account-card p { font-size: 0.82rem; font-weight: 600; }
    .add-account-card span { font-size: 0.72rem; }

    /* Status indicator */
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.yellow { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .status-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }

    /* Greeting */
    .greeting-section {
      margin-bottom: 28px;
    }

    .greeting-section .greeting-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--brand-orange);
      margin-bottom: 4px;
    }

    .greeting-section h1 { margin-bottom: 4px; }
    .greeting-section p { font-size: 0.82rem; }

    /* Summary bar */
    .summary-bar {
      display: flex;
      gap: 1px;
      background: var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 28px;
    }

    .summary-item {
      flex: 1;
      background: var(--bg-card);
      padding: 16px 20px;
    }

    .summary-item:first-child { border-radius: var(--radius-lg) 0 0 var(--radius-lg); }
    .summary-item:last-child { border-radius: 0 var(--radius-lg) var(--radius-lg) 0; }

    @media (max-width: 600px) {
      .summary-bar { flex-direction: column; gap: 1px; }
      .summary-item { border-radius: 0 !important; }
      .summary-item:first-child { border-radius: var(--radius-lg) var(--radius-lg) 0 0 !important; }
      .summary-item:last-child { border-radius: 0 0 var(--radius-lg) var(--radius-lg) !important; }
      .accounts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- Loading screen -->
<div class="loading-screen" id="loadingScreen">
  <img src="assets/logo-blanco.png" alt="TPL" class="logo-dark-mode" />
  <p>Cargando...</p>
</div>

<!-- App layout -->
<div class="app-layout" id="appLayout" style="display:none">

  <!-- Sidebar overlay mobile -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="assets/logo-blanco.png" alt="TPL" class="logo-dark-mode" width="36" height="36" />
      <div class="sidebar-logo-text">
        <span class="brand-name">Trading Pro Lab</span>
        <span class="brand-sub">Journal del Rey</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a class="nav-item active" href="cuentas.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Mis Cuentas
      </a>
      <a class="nav-item" href="nueva-cuenta.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        Nueva Cuenta
      </a>

      <div class="nav-section-label" style="margin-top:8px">Cuenta</div>
      <a class="nav-item" href="perfil.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Mi Perfil
      </a>
    </nav>

    <div class="sidebar-bottom">
      <div class="nav-item" onclick="handleLogout()" style="cursor:pointer;color:var(--red)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar sesión
      </div>
    </div>
  </aside>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger" onclick="toggleSidebar()" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-breadcrumb">
        <span>Mis Cuentas</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="theme-toggle" id="themeToggle" title="Cambiar tema" aria-label="Cambiar tema"></button>
      <div class="avatar" id="userAvatar">?</div>
    </div>
  </header>

  <!-- Main content -->
  <main class="main-content">

    <!-- Greeting -->
    <div class="greeting-section">
      <div class="greeting-label">Bienvenido de vuelta</div>
      <h1 id="greetingName">Rey</h1>
      <p id="greetingDate">—</p>
    </div>

    <!-- Summary bar -->
    <div class="summary-bar">
      <div class="summary-item">
        <div class="kpi-label">Cuentas activas</div>
        <div class="kpi-value" id="totalAccounts">—</div>
      </div>
      <div class="summary-item">
        <div class="kpi-label">Capital total gestionado</div>
        <div class="kpi-value" id="totalCapital">—</div>
      </div>
      <div class="summary-item">
        <div class="kpi-label">Mejor cuenta (% neto)</div>
        <div class="kpi-value positive" id="bestAccount">—</div>
      </div>
      <div class="summary-item">
        <div class="kpi-label">Total operaciones</div>
        <div class="kpi-value" id="totalTrades">—</div>
      </div>
    </div>

    <!-- Section -->
    <div class="section-header">
      <div class="section-title">Cuentas</div>
      <a href="nueva-cuenta.html" class="btn btn-primary btn-sm">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nueva cuenta
      </a>
    </div>

    <!-- Accounts grid -->
    <div class="accounts-grid" id="accountsGrid">
      <!-- Cargando... -->
    </div>

  </main>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // ── PEGA TUS CREDENCIALES AQUÍ ────────────────────────────
  const FIREBASE_CONFIG = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROYECTO.firebaseapp.com",
    projectId: "TU_PROYECTO_ID",
    storageBucket: "TU_PROYECTO.appspot.com",
    messagingSenderId: "TU_SENDER_ID",
    appId: "TU_APP_ID"
  };
  // ─────────────────────────────────────────────────────────

  const app = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null;

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }

    currentUser = user;
    const userDoc = await getDoc(doc(db, 'users', user.uid));
    if (!userDoc.exists() || userDoc.data().active === false) {
      await signOut(auth);
      window.location.href = 'index.html';
      return;
    }

    const userData = userDoc.data();
    initUI(userData);
    await loadAccounts(user.uid);

    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('appLayout').style.display = 'flex';
  });

  async function loadAccounts(uid) {
    const grid = document.getElementById('accountsGrid');
    grid.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;padding:20px">Cargando cuentas...</div>';

    try {
      const q = query(collection(db, 'users', uid, 'accounts'), orderBy('createdAt', 'desc'));
      const snap = await getDocs(q);

      if (snap.empty) {
        grid.innerHTML = renderEmpty();
        updateSummary([], 0, 0);
        return;
      }

      const accounts = [];
      for (const docSnap of snap.docs) {
        const acc = { id: docSnap.id, ...docSnap.data() };
        // Cargar trades para calcular PnL neto
        const tradesSnap = await getDocs(collection(db, 'users', uid, 'accounts', acc.id, 'trades'));
        acc.trades = tradesSnap.docs.map(t => t.data());
        accounts.push(acc);
      }

      renderAccounts(accounts);
      const totalTrades = accounts.reduce((s, a) => s + a.trades.length, 0);
      const totalCapital = accounts.reduce((s, a) => s + (parseFloat(a.size) || 0), 0);
      updateSummary(accounts, totalCapital, totalTrades);
    } catch(e) {
      grid.innerHTML = '<div style="color:var(--red);font-size:0.8rem;padding:20px">Error cargando cuentas.</div>';
    }
  }

  function calcPnL(trades, accountSize) {
    if (!trades.length) return { pnlPct: 0, pnlUsd: 0 };
    const wins = trades.filter(t => t.result === 'win');
    const losses = trades.filter(t => t.result === 'loss');
    const gainUsd = wins.reduce((s, t) => s + (parseFloat(t.pnlUsd) || 0), 0);
    const lossUsd = losses.reduce((s, t) => s + (parseFloat(t.pnlUsd) || 0), 0);
    const pnlUsd = gainUsd - Math.abs(lossUsd);
    const pnlPct = accountSize > 0 ? (pnlUsd / accountSize) * 100 : 0;
    return { pnlPct, pnlUsd };
  }

  function calcDrawdown(trades) {
    // Calcular max drawdown simple
    if (!trades.length) return 0;
    let peak = 0, equity = 0, maxDD = 0;
    trades.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
    trades.forEach(t => {
      equity += parseFloat(t.pnlUsd) || 0;
      if (equity > peak) peak = equity;
      const dd = peak > 0 ? ((peak - equity) / peak) * 100 : 0;
      if (dd > maxDD) maxDD = dd;
    });
    return maxDD;
  }

  function getAccountHealth(pnlPct, maxDD) {
    if (maxDD > 8 || pnlPct < -5) return 'danger';
    if (maxDD > 4 || pnlPct < 0) return 'warning';
    return 'healthy';
  }

  function getStatusLabel(health) {
    return { healthy: 'Saludable', warning: 'Precaución', danger: 'Crítica' }[health];
  }

  function renderAccounts(accounts) {
    const grid = document.getElementById('accountsGrid');
    let html = '';

    accounts.forEach(acc => {
      const size = parseFloat(acc.size) || 0;
      const { pnlPct, pnlUsd } = calcPnL(acc.trades, size);
      const maxDD = calcDrawdown(acc.trades);
      const health = getAccountHealth(pnlPct, maxDD);
      const healthColors = { healthy: 'green', warning: 'yellow', danger: 'red' };
      const hc = healthColors[health];
      const pnlSign = pnlPct >= 0 ? '+' : '';
      const pnlColor = pnlPct >= 0 ? 'var(--green)' : 'var(--red)';
      const typeLabel = acc.type === 'fondeo' ? 'Fondeo' : 'Capital Real';
      const typeBg = acc.type === 'fondeo' ? 'var(--yellow-dim)' : 'var(--green-dim)';
      const typeColor = acc.type === 'fondeo' ? 'var(--yellow)' : 'var(--green)';

      html += `
      <div class="account-card ${health}" onclick="window.location.href='dashboard.html?id=${acc.id}'">
        <div class="flex-between">
          <span class="account-type-badge" style="background:${typeBg};color:${typeColor}">${typeLabel}</span>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="status-dot ${hc}"></div>
            <span style="font-size:0.65rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em">${getStatusLabel(health)}</span>
          </div>
        </div>

        <div class="account-size">$${formatNumber(size)}</div>
        <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:8px">${acc.currency || 'USD'} · ${acc.name || 'Sin nombre'}</div>

        <div style="display:flex;align-items:baseline;gap:8px">
          <span class="account-pnl" style="color:${pnlColor}">${pnlSign}${pnlPct.toFixed(2)}%</span>
          <span style="font-size:0.75rem;color:var(--text-muted);font-family:var(--font-mono)">${pnlSign}$${Math.abs(pnlUsd).toFixed(2)}</span>
        </div>

        <div class="progress-bar" style="margin-top:10px">
          <div class="progress-fill ${pnlPct >= 0 ? 'green' : 'red'}" style="width:${Math.min(Math.abs(pnlPct / acc.goalPct * 100), 100)}%"></div>
        </div>
        <div style="font-size:0.65rem;color:var(--text-muted);margin-top:4px">Meta: ${acc.goalPct || 0}% · Progreso: ${acc.goalPct > 0 ? ((pnlPct / acc.goalPct) * 100).toFixed(1) : 0}%</div>

        <div class="account-meta">
          <div class="account-meta-row">
            <span class="key">Estrategia</span>
            <span class="val truncate" style="max-width:140px">${acc.strategy || '—'}</span>
          </div>
          <div class="account-meta-row">
            <span class="key">Operaciones</span>
            <span class="val">${acc.trades.length}</span>
          </div>
          <div class="account-meta-row">
            <span class="key">Max Drawdown</span>
            <span class="val" style="color:${maxDD > 5 ? 'var(--red)' : 'var(--text-secondary)'}">${maxDD.toFixed(2)}%</span>
          </div>
        </div>

        <div class="account-footer">
          <a href="dashboard.html?id=${acc.id}" class="btn btn-primary btn-sm" style="flex:1" onclick="event.stopPropagation()">Ver Dashboard</a>
          <a href="dashboard.html?id=${acc.id}&tab=journal" class="btn btn-ghost btn-sm" onclick="event.stopPropagation()">Journal</a>
        </div>
      </div>`;
    });

    // Card de agregar
    html += `
    <div class="add-account-card" onclick="window.location.href='nueva-cuenta.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>Agregar cuenta</p>
      <span>Fondeo o capital propio</span>
    </div>`;

    grid.innerHTML = html;
  }

  function renderEmpty() {
    return `
    <div style="grid-column:1/-1">
      <div class="empty-state">
        <svg class="empty-state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        <h3>Todavía no tienes cuentas</h3>
        <p style="margin-top:6px;margin-bottom:20px">Crea tu primera cuenta para comenzar a trackear tu trading.</p>
        <a href="nueva-cuenta.html" class="btn btn-primary">Crear primera cuenta</a>
      </div>
    </div>
    <div class="add-account-card" onclick="window.location.href='nueva-cuenta.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <p>Agregar cuenta</p>
      <span>Fondeo o capital propio</span>
    </div>`;
  }

  function updateSummary(accounts, totalCapital, totalTrades) {
    document.getElementById('totalAccounts').textContent = accounts.length;
    document.getElementById('totalCapital').textContent = '$' + formatNumber(totalCapital);
    document.getElementById('totalTrades').textContent = totalTrades;

    if (accounts.length) {
      let best = accounts[0];
      let bestPnl = -Infinity;
      accounts.forEach(acc => {
        const { pnlPct } = calcPnL(acc.trades, parseFloat(acc.size) || 0);
        if (pnlPct > bestPnl) { bestPnl = pnlPct; best = acc; }
      });
      const sign = bestPnl >= 0 ? '+' : '';
      document.getElementById('bestAccount').textContent = `${sign}${bestPnl.toFixed(2)}%`;
      document.getElementById('bestAccount').className = 'kpi-value ' + (bestPnl >= 0 ? 'positive' : 'negative');
    } else {
      document.getElementById('bestAccount').textContent = '—';
    }
  }

  function initUI(userData) {
    const name = userData.displayName || 'Rey';
    document.getElementById('greetingName').textContent = name;
    document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();

    const now = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('greetingDate').textContent = now.toLocaleDateString('es-ES', options);

    document.title = `${name} — Journal del Rey`;
  }

  window.handleLogout = async function() {
    await signOut(auth);
    window.location.href = 'index.html';
  };
</script>

<script>
  // Tema
  const savedTheme = localStorage.getItem('tpl-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  if (savedTheme === 'light') document.querySelectorAll('.logo-dark-mode').forEach(l => l.style.filter = 'invert(1)');

  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('tpl-theme', next);
    document.querySelectorAll('.logo-dark-mode').forEach(l => l.style.filter = next === 'light' ? 'invert(1)' : '');
  });

  // Sidebar mobile
  window.toggleSidebar = function() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  };
  window.closeSidebar = function() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  };

  function formatNumber(n) {
    if (n >= 1000) return n.toLocaleString('en-US');
    return n.toString();
  }
  window.formatNumber = formatNumber;
</script>
</body>
</html>
